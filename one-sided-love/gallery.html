<!DOCTYPE html>
<html lang="en" data-mood="night">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — unsent letters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
  <div id="particle-field"></div>

  <nav class="site-nav">
    <a href="index.html" class="brand">Dipak Roy<small>Letters Never Sent</small></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="diary.html">Diary</a></li>
      <li><a href="quotes.html">Quotes</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="memories.html">Memories</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-controls">
      <button class="mood-toggle" title="Toggle day / night" aria-label="Toggle mood">☾</button>
      <button class="music-toggle" title="Toggle ambient sound" aria-label="Toggle music"
        aria-pressed="false">♪</button>
      <button class="nav-toggle" aria-label="Open menu">☰</button>
    </div>
  </nav>

  <main>
    <section class="hero" style="min-height:46vh;">
      <div class="container">
        <p class="eyebrow hero-kicker" data-reveal>scenes, not photographs</p>
        <h1 data-reveal>The <em>gallery.</em></h1>
        <p class="lede" data-reveal>Some moments don't need a picture — just a place to sit. Tap a card to open it.</p>
      </div>
    </section>

    <section>
      <div class="container">
        <div class="gallery-grid" data-gallery data-reveal>
          <div class="gallery-item" data-caption="The day I smiled">
            <img src="assets/images/gallery/photo1.jpeg" alt="My Photo 1">
          </div>

          <div class="gallery-item" data-caption="A beautiful memory">
            <img src="assets/images/gallery/photo2.jpeg" alt="My Photo 2">
          </div>

          <div class="gallery-item" data-caption="College days">
            <img src="assets/images/gallery/photo3.jpeg" alt="My Photo 3">
          </div>

          <div class="gallery-item" data-caption="One unforgettable moment">
            <img src="assets/images/gallery/photo4.jpeg" alt="My Photo 4">
          </div>

          <div class="gallery-item" data-caption="A happy evening">
            <img src="assets/images/gallery/photo5.jpeg" alt="My Photo 5">
          </div>

          <div class="gallery-item" data-caption="Still remembering">
            <img src="assets/images/gallery/photo6.jpeg" alt="My Photo 6">
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <span>© 2026 — written quietly, kept honestly.</span>
    <span>unsent letters</span>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/scroll.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/music.js"></script>
</body>

</html>
